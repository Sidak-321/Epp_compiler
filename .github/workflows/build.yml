name: Build EPP Compiler

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install build tools
        run: sudo apt-get install -y g++ make

      - name: Build project
        run: make

      - name: Smoke test - compile mode
        run: |
          echo "x = 3 + 5" > test_input.txt
          echo "ret x" >> test_input.txt
          ./epp compile test_input.txt test_output.txt 10

      - name: Smoke test - run mode
        run: ./epp run test_input.txt

      - name: Smoke test - help
        run: ./epp || true