# .github/workflows/build.yml
# This file tells GitHub Actions what to do on every push

name: Build EPP Compiler   # Name shown on GitHub UI

on:
  push:                    # Trigger: run on every push
    branches: [ main ]     # Only on the main branch
  pull_request:
    branches: [ main ]     # Also run on pull requests to main

jobs:
  build:
    runs-on: ubuntu-latest   # Use a fresh Ubuntu Linux machine

    steps:
      # Step 1: Download your code onto the CI machine
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Verify g++ is available (it is on ubuntu-latest by default)
      - name: Install build tools
        run: sudo apt-get install -y g++ make

      # Step 3: Run 'make' — if this fails, the CI turns red
      - name: Build project
        run: make

      # Step 4: Run the binary to verify it executes
      - name: Smoke test
        run: ./epp tests/test1.txt tests/output.txt 10